name: Live Paper Trade

on:
  schedule:
    # Every 15 min from 16:00-22:00 UTC (covers all US close times across all DST combos).
    # GHA cron has ~5-10 min jitter; idempotent client_order_id prevents double-submission.
    - cron: "*/15 16-21 * * 1-5"  # Mon-Fri only
  workflow_dispatch: {}  # Manual trigger for testing

concurrency:
  group: live-trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    permissions:
      contents: write  # needed to commit trade_log.json back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Monitor (pre-trade)
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: python monitor.py pre

      - name: Run live strategy
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: python live.py

      - name: Monitor (post-trade)
        if: always()
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: python monitor.py post

      - name: Commit trade log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/trade_log.json
          git diff --cached --quiet || git commit -m "Update trade log [skip ci]"
          git pull --rebase
          git push
