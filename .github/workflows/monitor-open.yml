name: Monitor (Market Open)

on:
  schedule:
    # 13:00 UTC Mon-Fri = 9:00 AM EDT / 8:00 AM EST.
    # Captures overnight account state before the trading day begins.
    - cron: "0 13 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: monitor-open
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Snapshot (market open)
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: python monitor.py market_open

      - name: Commit trade log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/trade_log.json
          git diff --cached --quiet || git commit -m "Monitor snapshot (market_open) [skip ci]"
          git pull --rebase
          git push
